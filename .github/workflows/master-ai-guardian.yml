name: Master AI Guardian (Phase 1)

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Optional command for the agent (leave empty for general audit)'
        required: false
        default: ''

jobs:
  run-guardian:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Run Master AI Guardian
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          GUARDIAN_COMMAND: ${{ github.event.inputs.command }}
        run: python scripts/master_guardian.py

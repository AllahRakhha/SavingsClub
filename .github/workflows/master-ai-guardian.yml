name: Master AI Guardian

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Run Master Guardian
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: python scripts/master_guardian.py

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: guardian-report
          path: weekly_guardian_report_*.md

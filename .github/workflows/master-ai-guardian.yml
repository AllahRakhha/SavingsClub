name: Master AI Guardian - Weekly Audit

on:
  schedule:
    - cron: '0 3 * * 0'   # Every Sunday at 3:00 AM UTC
  workflow_dispatch:       # Manual trigger

jobs:
  master-guardian-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Master AI Guardian Weekly Audit
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: python scripts/master_guardian.py

      - name: Create GitHub Issue with Report
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const files = fs.readdirSync('.').filter(f => f.startsWith('weekly_guardian_report_'));
            if (files.length === 0) {
              console.log('No report found');
              return;
            }
            const report = fs.readFileSync(files[0], 'utf8');
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Master AI Guardian Weekly Report - ${new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}`,
              body: report,
              labels: ['guardian', 'compliance', 'seo', 'weekly-report']
            });

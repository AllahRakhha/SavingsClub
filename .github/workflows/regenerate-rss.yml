name: Regenerate RSS Feed Only

# Manual trigger only - does NOT run automatically
# Use this when you need to rebuild rss.xml without creating a new blog post
on:
  workflow_dispatch:

jobs:
  regenerate-rss:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Regenerate rss.xml from existing posts
        run: node regenerate-rss.js

      - name: Commit and push rss.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rss.xml
          git diff --staged --quiet || git commit -m "Regenerate rss.xml (no new blog)"
          git pull --no-rebase origin main
          git push

name: Generate Blog Post

on:
  schedule:
    - cron: '0 13 * * 1,3,5'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: node generate-post.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Commit new post
        run: |
          git config user.name "SavingsClub Bot"
          git config user.email "bot@savingsclub.com"
          git add -A
          git diff --staged --quiet || git commit -m "New blog post [automated]"
          git push

name: Generate Blog Post

on:
  schedule:
    # Runs every Monday, Wednesday, Friday at 9:00 AM Eastern Time (13:00 UTC)
    - cron: '0 13 * * 1,3,5'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run blog post generator
        run: node generate-post.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}

      - name: Commit and push new post
        run: |
          git config user.name "SavingsClub Bot"
          git config user.email "bot@savingsclub.com"
          git add -A

          if git diff --staged --quiet; then
            echo "No new changes. Skipping commit."
            exit 0
          fi

          git commit -m "New blog post [automated]"
          git push origin main

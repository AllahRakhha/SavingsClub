name: Generate Blog Post

on:
  schedule:
    - cron: '0 13 * * 1,3,5'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate blog post
        run: node generate-post.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push new post
        run: |
          git config user.name "SavingsClub Bot"
          git config user.email "bot@savingsclub.com"

          git pull origin main --rebase

          git add -A

          git diff --staged --quiet || git commit -m "New blog post [automated]"

          git push origin main
